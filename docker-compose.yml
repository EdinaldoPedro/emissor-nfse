version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: nfse-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nfse_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina_POSTGRES_PASSWORD_no_ambiente}
      POSTGRES_DB: ${POSTGRES_DB:-nfse_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
